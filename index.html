<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitruvius — Fitness Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vitruvius">
  <meta name="theme-color" content="#f4ede0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=5">
  <style>
    .inspire-block {
      background: #fbf6ec !important;
      border: 1px solid rgba(184,115,51,0.30) !important;
      border-top: 3px solid #b87333 !important;
      border-radius: 10px;
      padding: 22px 20px 14px;
      margin-bottom: 24px;
      box-shadow: 0 2px 6px rgba(10,51,70,0.07), 0 8px 24px rgba(10,51,70,0.10);
    }
    .inspire-block p {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 19px;
      font-style: italic;
      font-weight: 500;
      color: #0a3346;
      line-height: 1.5;
    }
    .inspire-block cite {
      display: block;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 14px;
      font-style: italic;
      font-weight: 400;
      color: #a89c86;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <header class="app-header">
    <span class="app-logo">Vitruvius</span>
    <span class="header-date" id="header-date"></span>
  </header>

  <main class="app-main" id="app-main">
    <section class="view" id="view-dashboard"></section>
    <section class="view hidden" id="view-log"></section>
    <section class="view hidden" id="view-progress"></section>
    <section class="view hidden" id="view-weight"></section>
  </main>

  <!-- Workout Bottom Sheet -->
  <div class="sheet-overlay hidden" id="workout-sheet">
    <div class="sheet-backdrop" onclick="window._closeSheet()"></div>
    <div class="sheet-panel">
      <div class="sheet-handle-bar"></div>
      <div class="sheet-inner" id="sheet-content"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
      <span>Home</span>
    </button>
    <button class="nav-btn" data-view="log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      <span>Log</span>
    </button>
    <button class="nav-btn" data-view="progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
        <polyline points="16 7 22 7 22 13"/>
      </svg>
      <span>Progress</span>
    </button>
    <button class="nav-btn" data-view="weight">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="14" width="20" height="7" rx="1"/>
        <path d="M7 14V9a5 5 0 0110 0v5"/>
      </svg>
      <span>Weight</span>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="module" src="app.js"></script>
  <script>
    (function() {
      function styleQuoteCard() {
        var dashboard = document.getElementById('view-dashboard');
        if (!dashboard) return;
        for (var i = 0; i < dashboard.children.length; i++) {
          var card = dashboard.children[i];
          if (card.tagName === 'DIV' && card.querySelector('cite')) {
            card.style.background = '#fbf6ec';
            card.style.border = '1px solid rgba(184,115,51,0.30)';
            card.style.borderTop = '3px solid #b87333';
            card.style.borderRadius = '10px';
            card.style.padding = '22px 20px 14px';
            card.style.marginBottom = '24px';
            card.style.boxShadow = '0 2px 6px rgba(10,51,70,0.07),0 8px 24px rgba(10,51,70,0.10)';
            var p = card.querySelector('p');
            if (p) {
              p.style.fontFamily = "'Cormorant Garamond',Georgia,serif";
              p.style.fontSize = '19px';
              p.style.fontStyle = 'italic';
              p.style.fontWeight = '500';
              p.style.color = '#0a3346';
              p.style.lineHeight = '1.5';
            }
            var cite = card.querySelector('cite');
            if (cite) {
              cite.style.display = 'block';
              cite.style.fontFamily = "'Cormorant Garamond',Georgia,serif";
              cite.style.fontSize = '14px';
              cite.style.fontStyle = 'italic';
              cite.style.fontWeight = '400';
              cite.style.color = '#a89c86';
              cite.style.marginTop = '10px';
            }
            break;
          }
        }
      }
      var dashboard = document.getElementById('view-dashboard');
      if (dashboard) {
        new MutationObserver(styleQuoteCard).observe(dashboard, {childList: true});
      }
    })();
  </script>
</body>
</html>
